name: Build Zygisk Mod from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Unzip & Android NDK via APT
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip android-sdk-platform-tools-common Google-android-ndk-installer || true
        sudo apt-get install -y make clang || true

    - name: Extract Zygisk Source ZIP
      run: |
        unzip "ZYGISK SRC RAMA MODZ.zip" -d ./

    - name: Paksa Trik Virtual Folder Dobby (Pasti Ketemu)
      run: |
        # Cari di mana lokasi folder Dobby yang asli (huruf besar)
        DOBBY_REAL=$(find . -type d -name "Dobby" | head -n 1)
        echo "Folder Dobby asli ada di: $DOBBY_REAL"
        
        if [ -n "$DOBBY_REAL" ]; then
          # Masuk ke folder induk tempat Dobby berada
          cd "$(dirname "$DOBBY_REAL")"
          
          # Buat folder bayangan bernama 'dobby' (huruf kecil) yang isinya nembus ke folder Dobby asli
          ln -s Dobby dobby || cp -r Dobby dobby
          echo "Membuat folder bayangan dobby huruf kecil di folder utama."
          
          # Masuk ke folder RAMA_MODZ tempat Main.cpp berada
          if [ -d "RAMA_MODZ" ]; then
            cd RAMA_MODZ
            # Buat folder bayangan dobby di dalam folder RAMA_MODZ juga agar langsung dibaca oleh Main.cpp
            ln -s ../Dobby dobby || cp -r ../Dobby dobby
            echo "Membuat folder bayangan dobby huruf kecil di dalam RAMA_MODZ."
            cd ..
          fi
          
          cd -
        fi

    - name: Set up Java JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Build Zygisk Mod
      run: |
        JNI_DIR=$(find . -name "jni" -type d | head -n 1)
        cd "$JNI_DIR/.."
        
        # Masukkan flag pencarian global ke compiler agar dia mencari ke semua folder Dobby secara otomatis
        export NDK_CFLAGS="-I./jni -I./jni/Dobby -I./jni/dobby -I./jni/RAMA_MODZ -I."
        export APP_CFLAGS="-I./jni -I./jni/Dobby -I./jni/dobby -I./jni/RAMA_MODZ -I."
        
        if command -v ndk-build &> /dev/null; then
          ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=. CFLAGS="$NDK_CFLAGS" APP_CFLAGS="$APP_CFLAGS"
        else
          $ANDROID_HOME/ndk-bundle/ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=. CFLAGS="$NDK_CFLAGS" APP_CFLAGS="$APP_CFLAGS" || ./ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=. CFLAGS="$NDK_CFLAGS" APP_CFLAGS="$APP_CFLAGS" || true
        fi

    - name: Upload Build Artifact (ARM64)
      uses: actions/upload-artifact@v4
      with:
        name: Zygisk-Mod-ARM64-Release
        path: |
          **/libs/arm64-v8a/*
          **/out/*.zip
          **/build/outputs/**/*.zip
          **/build/outputs/apk/release/*.apk
