name: Build Zygisk Mod from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Unzip & Android NDK via APT
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip android-sdk-platform-tools-common Google-android-ndk-installer || true
        sudo apt-get install -y make clang || true

    - name: Extract Zygisk Source ZIP
      run: |
        unzip "ZYGISK SRC RAMA MODZ.zip" -d ./

    - name: Paksa Perbaiki Jalur Dobby dan Main.cpp
      run: |
        # Cari folder jni secara manual dan masuk ke dalamnya
        JNI_DIR=$(find . -name "jni" -type d | head -n 1)
        echo "Folder JNI ditemukan di: $JNI_DIR"
        
        cd "$JNI_DIR"
        
        # 1. Duplikasi folder Dobby menjadi dobby (huruf kecil) agar compiler Linux tidak bingung
        if [ -d "Dobby" ]; then
          cp -r Dobby dobby
          echo "Berhasil menduplikasi folder Dobby ke dobby."
        fi
        
        # 2. Paksa ganti tulisan dobby/dobby.h di Main.cpp menjadi Dobby/dobby.h atau dobby.h langsung
        if [ -f "Main.cpp" ]; then
          sed -i 's|"dobby/dobby.h"|"dobby.h"|g' Main.cpp
          sed -i 's|<dobby/dobby.h>|<dobby.h>|g' Main.cpp
          echo "Berhasil mengubah isi #include di Main.cpp secara paksa!"
        fi
        
        # 3. Salin file dobby.h langsung ke luar folder jni agar gampang dibaca
        cp dobby/dobby.h ./ || true
        
        cd -

    - name: Set up Java JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Build Zygisk Mod
      run: |
        JNI_DIR=$(find . -name "jni" -type d | head -n 1)
        cd "$JNI_DIR/.."
        
        # Jalankan kompilasi NDK
        if command -v ndk-build &> /dev/null; then
          ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=.
        else
          $ANDROID_HOME/ndk-bundle/ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=. || ./ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=. || true
        fi

    - name: Upload Build Artifact (ARM64)
      uses: actions/upload-artifact@v4
      with:
        name: Zygisk-Mod-ARM64-Release
        path: |
          **/libs/arm64-v8a/*
          **/out/*.zip
          **/build/outputs/**/*.zip
          **/build/outputs/apk/release/*.apk
