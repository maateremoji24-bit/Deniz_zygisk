name: Build Zygisk Mod from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Unzip & Android NDK via APT
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip android-sdk-platform-tools-common Google-android-ndk-installer || true
        sudo apt-get install -y make clang || true

    - name: Extract Zygisk Source ZIP
      run: |
        unzip "ZYGISK SRC RAMA MODZ.zip" -d ./

    - name: Paksa Tembus Konfigurasi Android.mk (Pasti Sukses)
      run: |
        # 1. Cari letak folder jni utama Anda
        JNI_DIR=$(find . -name "jni" -type d | head -n 1)
        echo "Folder JNI ditemukan di: $JNI_DIR"
        
        cd "$JNI_DIR"
        
        # 2. Samakan nama folder Dobby kapital menjadi huruf kecil agar dibaca Linux
        if [ -d "Dobby" ]; then
          cp -r Dobby dobby
        fi
        
        # 3. Suntik file Android.mk agar memaksa compiler memasukkan folder dobby ke dalam include path global
        if [ -f "Android.mk" ]; then
          echo "Memodifikasi file Android.mk..."
          # Menyisipkan flag include folder dobby tepat setelah deklarasi LOCAL_PATH
          sed -i '/LOCAL_PATH/a LOCAL_C_INCLUDES += $(LOCAL_PATH)/dobby $(LOCAL_PATH)/Dobby $(LOCAL_PATH)' Android.mk
          sed -i '/LOCAL_PATH/a LOCAL_CFLAGS += -I$(LOCAL_PATH)/dobby -I$(LOCAL_PATH)/Dobby' Android.mk
          
          echo "=== ISI ANDROID.MK SETELAH DIEDIT ==="
          cat Android.mk
        fi
        
        cd -

    - name: Set up Java JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Build Zygisk Mod
      run: |
        JNI_DIR=$(find . -name "jni" -type d | head -n 1)
        cd "$JNI_DIR/.."
        
        if command -v ndk-build &> /dev/null; then
          ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=.
        else
          $ANDROID_HOME/ndk-bundle/ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=. || ./ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=. || true
        fi

    - name: Upload Build Artifact (ARM64)
      uses: actions/upload-artifact@v4
      with:
        name: Zygisk-Mod-ARM64-Release
        path: |
          **/libs/arm64-v8a/*
          **/out/*.zip
          **/build/outputs/**/*.zip
          **/build/outputs/apk/release/*.apk
