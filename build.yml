name: Build Zygisk Mod from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # Menggunakan Ubuntu lama agar kompatibel dengan NDK jadul

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Unzip & Android NDK via APT
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip make clang git python3 || true

    - name: Extract Zygisk Source ZIP
      run: |
        unzip "ZYGISK SRC RAMA MODZ.zip" -d ./

    - name: Download and Setup Old NDK Legacy
      run: |
        # Mengunduh NDK versi lama secara manual agar fungsi kompilasi jadulnya aktif kembali
        echo "Mengunduh paket NDK versi kompatibilitas lama..."
        curl -L https://google.com -o ndk_legacy.zip
        unzip -q ndk_legacy.zip
        echo "NDK_LEGACY_HOME=$GITHUB_WORKSPACE/android-ndk-r10e" >> $GITHUB_ENV

    - name: Paksa Trik Struktur Berkas Duplikat
      run: |
        # Menduplikasi berkas dobby di semua titik agar jalur lokal lama tetap terbaca
        ORIGINAL_DOBBY_H=$(find . -name "dobby.h" | head -n 1)
        if [ -n "$ORIGINAL_DOBBY_H" ]; then
          find . -type d | while read -r dir; do
            mkdir -p "$dir/dobby"
            cp "$ORIGINAL_DOBBY_H" "$dir/dobby/" 2>/dev/null || true
            cp "$ORIGINAL_DOBBY_H" "$dir/" 2>/dev/null || true
          done
        fi

    - name: Set up Java JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Build Zygisk Mod (Legacy Mode)
      run: |
        JNI_DIR=$(find . -name "jni" -type d | head -n 1)
        cd "$JNI_DIR/.."
        
        # Menjalankan kompilasi menggunakan biner NDK versi jadul yang diunduh tadi
        $NDK_LEGACY_HOME/ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=.

    - name: Upload Build Artifact (ARM64)
      uses: actions/upload-artifact@v4
      with:
        name: Zygisk-Mod-ARM64-Release
        path: |
          **/libs/arm64-v8a/*
          **/out/*.zip
          **/build/outputs/**/*.zip
          **/build/outputs/apk/release/*.apk
