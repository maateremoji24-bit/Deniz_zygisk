name: Build Zygisk Mod from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Unzip & Android NDK via APT
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip android-sdk-platform-tools-common Google-android-ndk-installer || true
        sudo apt-get install -y make clang || true

    - name: Extract Zygisk Source ZIP
      run: |
        unzip "ZYGISK SRC RAMA MODZ.zip" -d ./

    - name: Paksa Tulis Ulang Konfigurasi Kompilasi (Reset Total Android.mk)
      run: |
        # Cari di mana lokasi folder jni utama Anda berada
        JNI_DIR=$(find . -name "jni" -type d | head -n 1)
        echo "Folder JNI ditemukan di: $JNI_DIR"
        
        cd "$JNI_DIR"
        
        # 1. Samakan folder Dobby kapital menjadi huruf kecil untuk Linux
        if [ -d "Dobby" ]; then
          cp -r Dobby dobby
        fi
        
        # 2. Hapus Android.mk lama yang bermasalah dan ganti dengan konfigurasi baru yang dipaksa lolos
        rm -f Android.mk
        
        cat << 'EOF' > Android.mk
        LOCAL_PATH := $(call my-dir)
        
        include $(CLEAR_VARS)
        
        LOCAL_MODULE    := RAMA_MODZ
        
        # Memaksa compiler mencari file header di folder jni, dobby, Dobby, dan RAMA_MODZ
        LOCAL_C_INCLUDES := $(LOCAL_PATH) \
                            $(LOCAL_PATH)/dobby \
                            $(LOCAL_PATH)/Dobby \
                            $(LOCAL_PATH)/RAMA_MODZ
        
        LOCAL_CFLAGS     := -DNDEBUG -O3 -I$(LOCAL_PATH)/dobby -I$(LOCAL_PATH)/Dobby
        
        # Mencari otomatis semua file .cpp dan .c di dalam folder jni dan subfoldernya
        LOCAL_SRC_FILES  := $(wildcard *.cpp) \
                            $(wildcard *.c) \
                            $(wildcard RAMA_MODZ/*.cpp) \
                            $(wildcard RAMA_MODZ/*.c) \
                            $(wildcard RamaModz/*.cpp) \
                            $(wildcard RamaModz/*.c)
        
        # Memasukkan library prebuilt Dobby yang sudah ada di folder Anda
        LOCAL_LDFLAGS    := -llog -landroid
        
        include $(BUILD_SHARED_LIBRARY)
        EOF
        
        echo "=== BERHASIL RESET DAN MEMBUAT ANDROID.MK BARU ==="
        cat Android.mk
        cd -

    - name: Set up Java JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Build Zygisk Mod
      run: |
        JNI_DIR=$(find . -name "jni" -type d | head -n 1)
        cd "$JNI_DIR/.."
        
        if command -v ndk-build &> /dev/null; then
          ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=.
        else
          $ANDROID_HOME/ndk-bundle/ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=. || ./ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=. || true
        fi

    - name: Upload Build Artifact (ARM64)
      uses: actions/upload-artifact@v4
      with:
        name: Zygisk-Mod-ARM64-Release
        path: |
          **/libs/arm64-v8a/*
          **/out/*.zip
          **/build/outputs/**/*.zip
          **/build/outputs/apk/release/*.apk
