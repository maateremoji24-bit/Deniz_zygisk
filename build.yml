name: Build Zygisk Mod from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Unzip & Android NDK via APT
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip android-sdk-platform-tools-common Google-android-ndk-installer || true
        sudo apt-get install -y make clang || true

    - name: Extract Zygisk Source ZIP
      run: |
        unzip "ZYGISK SRC RAMA MODZ.zip" -d ./
        ls -la

    - name: Otomatis Edit Kode Main.cpp dan Struktur Folder
      run: |
        # 1. Cari file Main.cpp di mana pun dia berada
        MAIN_CPP=$(find . -name "Main.cpp" | head -n 1)
        
        if [ -n "$MAIN_CPP" ]; then
          echo "File Main.cpp ditemukan di: $MAIN_CPP"
          # Mengubah tulisan dobby/dobby.h menjadi Dobby/dobby.h secara otomatis
          sed -i 's|"dobby/dobby.h"|"Dobby/dobby.h"|g' "$MAIN_CPP"
          echo "Berhasil mengubah baris #include di Main.cpp!"
        else
          echo "Peringatan: Main.cpp tidak ditemukan langsung lewat pencarian standar."
        fi

        # 2. Duplikasi folder sebagai cadangan ekstra agar sistem tidak bingung membaca folder
        JNI_DIR=$(find . -name "jni" -type d | head -n 1)
        if [ -n "$JNI_DIR" ]; then
          cd "$JNI_DIR"
          if [ -d "Dobby" ]; then
            cp -r Dobby dobby
          fi
          cd -
        fi

    - name: Set up Java JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Build Zygisk Mod
      run: |
        GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
        JNI_DIR=$(find . -name "jni" -type d | head -n 1)

        if [ -n "$GRADLEW_PATH" ]; then
          echo "Mendeteksi proyek berbasis Gradle. Memulai build..."
          cd $(dirname "$GRADLEW_PATH")
          chmod +x gradlew
          ./gradlew assembleRelease
        elif [ -n "$JNI_DIR" ]; then
          echo "Mendeteksi proyek berbasis JNI/ndk-build. Memulai build..."
          cd "$JNI_DIR/.."
          if command -v ndk-build &> /dev/null; then
            ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=.
          elif [ -d "$ANDROID_HOME/ndk" ]; then
            LATEST_NDK=$(ls -d $ANDROID_HOME/ndk/* | sort -V | tail -n 1)
            $LATEST_NDK/ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=.
          else
            echo "Komponen ndk-build tidak dapat ditemukan di sistem!"
            exit 1
          fi
        else
          echo "Berkas konfigurasi build (Gradle/JNI) tidak ditemukan!"
          exit 1
        fi

    - name: Upload Build Artifact (ARM64)
      uses: actions/upload-artifact@v4
      with:
        name: Zygisk-Mod-ARM64-Release
        path: |
          **/libs/arm64-v8a/*
          **/out/*.zip
          **/build/outputs/**/*.zip
          **/build/outputs/apk/release/*.apk
