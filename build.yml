name: Build Zygisk Mod from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Unzip & Android NDK via APT
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip android-sdk-platform-tools-common Google-android-ndk-installer || true
        sudo apt-get install -y make clang || true

    - name: Extract Zygisk Source ZIP
      run: |
        unzip "ZYGISK SRC RAMA MODZ.zip" -d ./

    - name: Otomatis Edit Kode Main.cpp dan Struktur Folder
      run: |
        MAIN_CPP=$(find . -name "Main.cpp" | head -n 1)
        if [ -n "$MAIN_CPP" ]; then
          sed -i 's|"dobby/dobby.h"|"Dobby/dobby.h"|g' "$MAIN_CPP"
        fi
        JNI_DIR=$(find . -name "jni" -type d | head -n 1)
        if [ -n "$JNI_DIR" ]; then
          cd "$JNI_DIR"
          if [ -d "Dobby" ]; then
            cp -r Dobby dobby
          fi
          cd -
        fi

    - name: Set up Java JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Build Zygisk Mod
      run: |
        JNI_DIR=$(find . -name "jni" -type d | head -n 1)
        if [ -n "$JNI_DIR" ]; then
          cd "$JNI_DIR/.."
          # Menjalankan build dengan flag khusus agar error kode di dalam Main.cpp langsung ketahuan tanpa terpotong
          ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=. || (echo "=== LOG ERROR UTAMA ===" && ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=. V=1)
        else
          echo "Folder JNI tidak ditemukan!"
          exit 1
        fi

    - name: Upload Build Artifact (ARM64)
      uses: actions/upload-artifact@v4
      with:
        name: Zygisk-Mod-ARM64-Release
        path: |
          **/libs/arm64-v8a/*
          **/out/*.zip
          **/build/outputs/**/*.zip
          **/build/outputs/apk/release/*.apk
