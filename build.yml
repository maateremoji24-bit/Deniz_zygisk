name: Build Zygisk Mod from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Unzip & Android NDK via APT
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip android-sdk-platform-tools-common Google-android-ndk-installer || true
        sudo apt-get install -y make clang || true

    - name: Extract Zygisk Source ZIP
      run: |
        unzip "ZYGISK SRC RAMA MODZ.zip" -d ./

    - name: Solusi Agresif Copy Dobby ke Semua Folder
      run: |
        # Cari file dobby.h asli di dalam zip Anda
        ORIGINAL_DOBBY_H=$(find . -name "dobby.h" | head -n 1)
        echo "File dobby.h asli ditemukan di: $ORIGINAL_DOBBY_H"

        if [ -n "$ORIGINAL_DOBBY_H" ]; then
          # Trik Utama: Cari semua folder di dalam proyek, lalu buat subfolder bernama 'dobby' dan paste file 'dobby.h' di dalamnya.
          # Ini akan menjamin ke mana pun compiler mencari "dobby/dobby.h", jalurnya pasti ada secara fisik!
          find . -type d | while read -r dir; do
            mkdir -p "$dir/dobby"
            cp "$ORIGINAL_DOBBY_H" "$dir/dobby/" 2>/dev/null || true
            cp "$ORIGINAL_DOBBY_H" "$dir/" 2>/dev/null || true
          done
          echo "Selesai menyalin dobby.h secara merata ke seluruh struktur folder proyek!"
        else
          echo "Peringatan: dobby.h tidak ditemukan di dalam ZIP!"
        fi

    - name: Set up Java JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Build Zygisk Mod
      run: |
        JNI_DIR=$(find . -name "jni" -type d | head -n 1)
        cd "$JNI_DIR/.."
        
        if command -v ndk-build &> /dev/null; then
          ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=.
        else
          $ANDROID_HOME/ndk-bundle/ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=. || ./ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=. || true
        fi

    - name: Upload Build Artifact (ARM64)
      uses: actions/upload-artifact@v4
      with:
        name: Zygisk-Mod-ARM64-Release
        path: |
          **/libs/arm64-v8a/*
          **/out/*.zip
          **/build/outputs/**/*.zip
          **/build/outputs/apk/release/*.apk
