name: Build Zygisk Mod from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Unzip & Android NDK via APT
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip android-sdk-platform-tools-common Google-android-ndk-installer || true
        sudo apt-get install -y make clang || true

    - name: Extract Zygisk Source ZIP
      run: |
        unzip "ZYGISK SRC RAMA MODZ.zip" -d ./

    - name: Paksa Perbaiki Struktur Folder dan Edit Main.cpp
      run: |
        # 1. Cari file Main.cpp di subfolder mana pun
        MAIN_CPP_PATH=$(find . -name "Main.cpp" | head -n 1)
        echo "Main.cpp ditemukan di: $MAIN_CPP_PATH"
        
        if [ -n "$MAIN_CPP_PATH" ]; then
          # Ubah isi include agar langsung mencari file dobby.h di folder yang sama
          sed -i 's|"dobby/dobby.h"|"dobby.h"|g' "$MAIN_CPP_PATH"
          sed -i 's|<dobby/dobby.h>|<dobby.h>|g' "$MAIN_CPP_PATH"
          echo "Berhasil mengedit file Main.cpp!"
          
          # Dapatkan folder tempat Main.cpp berada (folder RAMA_MODZ)
          TARGET_DIR=$(dirname "$MAIN_CPP_PATH")
          
          # Cari di mana folder Dobby asli berada untuk diambil file dobby.h nya
          DOBBY_H_PATH=$(find . -name "dobby.h" | head -n 1)
          if [ -n "$DOBBY_H_PATH" ]; then
            echo "Menyalin berkas dobby.h dari $DOBBY_H_PATH ke $TARGET_DIR"
            cp "$DOBBY_H_PATH" "$TARGET_DIR/"
          fi
        fi

        # 2. Salin juga folder Dobby ke folder root kompilasi sebagai cadangan global
        JNI_DIR=$(find . -name "jni" -type d | head -n 1)
        if [ -n "$JNI_DIR" ]; then
          cd "$JNI_DIR"
          if [ -d "Dobby" ]; then
            cp -r Dobby dobby
            cp Dobby/dobby.h ./ 2>/dev/null || true
          fi
          cd -
        fi

    - name: Set up Java JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Build Zygisk Mod
      run: |
        JNI_DIR=$(find . -name "jni" -type d | head -n 1)
        cd "$JNI_DIR/.."
        
        # Tambahkan flag include global ke folder Dobby agar aman dari segala sisi
        export NDK_CFLAGS="-I./jni -I./jni/Dobby -I./jni/dobby -I./jni/RAMA_MODZ"
        export APP_CFLAGS="-I./jni -I./jni/Dobby -I./jni/dobby -I./jni/RAMA_MODZ"
        
        if command -v ndk-build &> /dev/null; then
          ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=. CFLAGS="$NDK_CFLAGS" APP_CFLAGS="$APP_CFLAGS"
        else
          $ANDROID_HOME/ndk-bundle/ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=. CFLAGS="$NDK_CFLAGS" APP_CFLAGS="$APP_CFLAGS" || ./ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=. CFLAGS="$NDK_CFLAGS" APP_CFLAGS="$APP_CFLAGS" || true
        fi

    - name: Upload Build Artifact (ARM64)
      uses: actions/upload-artifact@v4
      with:
        name: Zygisk-Mod-ARM64-Release
        path: |
          **/libs/arm64-v8a/*
          **/out/*.zip
          **/build/outputs/**/*.zip
          **/build/outputs/apk/release/*.apk
